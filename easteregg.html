<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="images/felpsdevsemfundo.png" />
  <title>Konami Easter Egg | FelpsDev</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --konami: #00ff99;
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #141414 0%, #0a0a0a 60%);
      color: #f1f1f1;
      font-family: 'Ubuntu Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
      padding: 1.5rem;
    }
    canvas#matrixRain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      opacity: 0.18;
    }
    .konami-container {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.6);
      padding: 2.75rem 2rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 2;
      margin-bottom: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      animation: fadeIn 1s cubic-bezier(.4, 0, .2, 1);
    }
    .konami-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--konami), transparent);
      border-radius: 24px 24px 0 0;
      opacity: 0.7;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes glitch {
      0%, 20%, 24%, 60%, 64%, 100% { transform: none; opacity: 1; }
      22% { transform: skewX(12deg); opacity: 0.85; }
      62% { transform: skewX(-12deg); opacity: 0.85; }
    }
    .konami-title {
      font-family: 'Press Start 2P', cursive;
      color: #fff;
      font-size: 1.2rem;
      line-height: 1.6;
      margin-bottom: 1.4rem;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.45);
      letter-spacing: 1px;
      animation: glitch 2.8s infinite;
    }
    .konami-desc {
      font-size: 1.02rem;
      margin-bottom: 1.6rem;
      color: #c8c8c8;
      line-height: 1.7;
    }
    .konami-desc b { color: #fff; }
    .konami-seq-highlight {
      color: var(--konami);
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0, 255, 153, 0.5);
    }
    .konami-sequence {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.6rem;
      flex-wrap: wrap;
    }
    .konami-key {
      background: rgba(255, 255, 255, 0.06);
      color: #d0d0d0;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.95rem;
      border-radius: 8px;
      padding: 0.55rem 0.7rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.12);
      transition: all 0.2s ease;
      opacity: 0.85;
      user-select: none;
    }
    .konami-key.active {
      background: var(--konami);
      color: #0a0a0a;
      opacity: 1;
      border-color: var(--konami);
      box-shadow: 0 0 20px rgba(0, 255, 153, 0.6);
      transform: translateY(-3px);
    }
    .konami-feedback {
      min-height: 32px;
      margin-bottom: 1.4rem;
      font-size: 1.05rem;
      color: var(--konami);
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    .konami-actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }
    .konami-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 320px;
      padding: 0.95rem 2rem;
      background: #fff;
      color: #0a0a0a;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.78rem;
      line-height: 1.4;
      border-radius: 50px;
      border: 1px solid #fff;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(255, 255, 255, 0.15);
      transition: all 0.3s ease;
      outline: none;
      text-decoration: none;
    }
    .konami-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 14px 36px rgba(255, 255, 255, 0.25);
    }
    .konami-btn.ghost {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: none;
    }
    .konami-btn.ghost:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.5);
    }
    .konami-celebrate {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.92);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1.5rem;
      animation: fadeIn 0.7s;
    }
    .konami-celebrate h2 {
      font-family: 'Press Start 2P', cursive;
      color: var(--konami);
      font-size: clamp(1.2rem, 5vw, 2rem);
      line-height: 1.5;
      margin-bottom: 1.5rem;
      text-align: center;
      text-shadow: 0 0 22px rgba(0, 255, 153, 0.7);
      letter-spacing: 2px;
      animation: popIn 0.7s cubic-bezier(.4, 0, .2, 1);
    }
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.7); }
      100% { opacity: 1; transform: scale(1); }
    }
    .confetti {
      position: fixed;
      top: 0;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      opacity: 0.85;
      z-index: 1100;
      pointer-events: none;
    }
    .konami-celebrate #matrixRain { display: block; opacity: 0.7; }
    @media (max-width: 600px) {
      .konami-title { font-size: 0.95rem; }
      .konami-container { padding: 1.8rem 1.2rem; }
      .konami-key { font-size: 0.8rem; padding: 0.45rem 0.55rem; }
      .konami-btn { font-size: 0.7rem; padding: 0.85rem 1.2rem; }
    }
  </style>
</head>
<body>
  <canvas id="matrixRain"></canvas>
  <div class="konami-container">
    <div class="konami-title">&#10022; ÁREA SECRETA &#10022;</div>
    <div class="konami-desc">
      O famoso <b>Código Konami</b> desbloqueia segredos incríveis!<br>
      Tente a sequência abaixo no seu teclado:<br>
      <span class="konami-seq-highlight">↑ ↑ ↓ ↓ ← → ← → B A</span>
    </div>
    <div class="konami-sequence" id="konami-sequence">
      <span class="konami-key">↑</span>
      <span class="konami-key">↑</span>
      <span class="konami-key">↓</span>
      <span class="konami-key">↓</span>
      <span class="konami-key">←</span>
      <span class="konami-key">→</span>
      <span class="konami-key">←</span>
      <span class="konami-key">→</span>
      <span class="konami-key">B</span>
      <span class="konami-key">A</span>
    </div>
    <div class="konami-feedback" id="konami-feedback">Digite a sequência ou toque no botão abaixo!</div>
    <div class="konami-actions">
      <button class="konami-btn" onclick="simulateKonamiCode()">Ativar Código Konami</button>
      <a href="index.html" class="konami-btn ghost">← Voltar à Página Inicial</a>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
        startMatrixRain();
    });

    // Konami code logic
    const konamiCode = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
    let konamiIndex = 0;
    let konamiActive = false;
    const sequenceEls = document.querySelectorAll('.konami-key');
    const feedbackEl = document.getElementById('konami-feedback');
    function highlightSequence(idx) {
      sequenceEls.forEach((el, i) => {
        el.classList.toggle('active', i === idx);
      });
    }
    function resetSequence() {
      sequenceEls.forEach(el => el.classList.remove('active'));
    }

    function playKeySound() {
        const keyAudio = new Audio('https://cdn.pixabay.com/audio/2022/03/15/audio_731c436a9a.mp3');
        keyAudio.volume = 0.4;
        keyAudio.play().catch(() => {});
    }

    document.addEventListener('keydown', (e) => {
      if (konamiActive) return;
      const key = e.key.toLowerCase();
      const expected = konamiCode[konamiIndex].toLowerCase();
      if (key === expected) {
        highlightSequence(konamiIndex);
        playKeySound();
        konamiIndex++;
        if (konamiIndex === konamiCode.length) {
          activateKonami();
          konamiIndex = 0;
          resetSequence();
        }
      } else {
        konamiIndex = 0;
        resetSequence();
      }
    });
    function simulateKonamiCode() {
      if (konamiActive) return;
      konamiCode.forEach((key, idx) => {
        setTimeout(() => {
          const event = new KeyboardEvent('keydown', { key });
          document.dispatchEvent(event);
        }, idx * 180);
      });
    }
    function activateKonami() {
      konamiActive = true;
      feedbackEl.textContent = '🎉 Código Konami ativado! 🎉';
      showCelebrate();
      playKonamiSound();
      createConfetti();
      document.getElementById('matrixRain').style.opacity = '0.7';
    }
    function showCelebrate() {
      const celebrate = document.createElement('div');
      celebrate.className = 'konami-celebrate';
      celebrate.innerHTML = `
        <h2 id="konami-type"></h2>
        <button class="konami-btn" onclick="window.location.reload()">Jogar Novamente</button>
        <a href="index.html" class="konami-btn ghost">← Voltar à Página Inicial</a>
      `;
      document.body.appendChild(celebrate);
      typeWriter(document.getElementById('konami-type'), '🎮 Código Konami Ativado! 🎮', 45);
    }
    function typeWriter(element, text, speed = 60) {
      let i = 0;
      element.innerHTML = '';
      function type() {
        if (i < text.length) {
          element.innerHTML += text.charAt(i);
          i++;
          setTimeout(type, speed);
        }
      }
      type();
    }
    function playKonamiSound() {
      const audio = document.createElement('audio');
      audio.src = 'https://cdn.pixabay.com/audio/2022/07/26/audio_124bfae1e2.mp3';
      audio.volume = 0.5;
      audio.play().catch(() => {});
    }
    function createConfetti() {
      const colors = ['#ffffff', '#cfcfcf', '#888888', '#00ff99', '#e0e0e0'];
      for (let i = 0; i < 100; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.opacity = (Math.random() * 0.5 + 0.5).toFixed(2);
        confetti.style.width = confetti.style.height = (Math.random() * 12 + 8) + 'px';
        confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        confetti.style.transform = `rotate(${Math.random()*360}deg)`;
        document.body.appendChild(confetti);
        const animationDuration = Math.random() * 3 + 2;
        confetti.animate([
          { transform: confetti.style.transform, opacity: confetti.style.opacity },
          { transform: `translateY(${window.innerHeight}px) rotate(${Math.random()*360}deg)`, opacity: 0 }
        ], {
          duration: animationDuration * 1000,
          easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)'
        });
        setTimeout(() => { confetti.remove(); }, animationDuration * 1000);
      }
    }
    function startMatrixRain() {
      const canvas = document.getElementById('matrixRain');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
      const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const nums = '0123456789';
      const alphabet = katakana + latin + nums;
      const fontSize = 18;
      const columns = Math.floor(canvas.width / fontSize);
      const rainDrops = [];
      for (let x = 0; x < columns; x++) rainDrops[x] = 1;
      function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = fontSize + 'px monospace';
        for (let i = 0; i < rainDrops.length; i++) {
          const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
          ctx.save();
          ctx.shadowColor = '#0F0';
          ctx.shadowBlur = 12;
          ctx.fillStyle = '#0F0';
          ctx.globalAlpha = 0.85;
          ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
          ctx.restore();
          if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            rainDrops[i] = 0;
          }
          rainDrops[i]++;
        }
      }
      setInterval(draw, 30);
      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });
    }
  </script>
</body>
</html>
